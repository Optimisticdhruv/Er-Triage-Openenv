name: ERTriageEnv
version: "1.0.0"
description: >
  Hospital Emergency Room triage simulation for AI agent training.
  Agent plays the role of triage nurse coordinator, assessing synthetic
  patients and assigning ESI priority levels based on published AHRQ
  Emergency Severity Index v4 algorithm. Graders are fully deterministic.
author: "Your Team Name Here"
license: MIT
homepage: "https://huggingface.co/spaces/YOURUSERNAME/er-triage-openenv"
tags:
  - openenv
  - medical
  - triage
  - healthcare
  - emergency
  - clinical-ai
  - ai-agent-environment
python_requires: ">=3.10"
openenv_spec: "1.0"

endpoints:
  reset: "GET /reset"
  step: "POST /step"
  state: "GET /state"
  health: "GET /health"

observation_space:
  type: object
  description: "Full ER floor state visible to agent (ERState model)"
  properties:
    task_id: {type: string}
    episode_id: {type: string}
    shift_time: {type: number, minimum: 0, maximum: 480}
    patients_waiting:
      type: array
      items:
        type: object
        properties:
          patient_id: {type: string}
          age: {type: integer, minimum: 0, maximum: 120}
          sex: {type: string, enum: [M, F]}
          chief_complaint: {type: string}
          arrival_mode: {type: string, enum: [ambulance, walk_in, transfer]}
          vitals:
            type: object
            properties:
              heart_rate: {type: integer, minimum: 20, maximum: 250}
              bp_systolic: {type: integer, minimum: 50, maximum: 250}
              bp_diastolic: {type: integer, minimum: 30, maximum: 150}
              spo2: {type: integer, minimum: 60, maximum: 100}
              respiratory_rate: {type: integer, minimum: 4, maximum: 60}
              temperature: {type: number, minimum: 32.0, maximum: 43.0}
              pain_score: {type: integer, minimum: 0, maximum: 10}
              gcs: {type: integer, minimum: 3, maximum: 15}
          waiting_minutes: {type: number, minimum: 0}
          active_alerts: {type: array, items: {type: string}}
    beds: {type: array}
    patients_triaged: {type: integer, minimum: 0}
    total_patients: {type: integer, minimum: 1}
    cumulative_reward: {type: number}
    active_alerts: {type: array, items: {type: string}}
    episode_done: {type: boolean}

action_space:
  type: object
  description: "Triage decision — submit via POST /step as JSON body"
  required: [patient_id, priority, bed_type]
  properties:
    patient_id: {type: string}
    priority: {type: integer, minimum: 1, maximum: 4,
      description: "ESI level: 1=immediate, 2=emergent, 3=urgent, 4=less-urgent"}
    bed_type: {type: string, enum: [resus, acute, minor, waiting_area]}
    escalate: {type: boolean}
    reasoning: {type: string}

tasks:
  task_easy:
    name: "Single Patient Triage"
    description: "Triage exactly one patient. Assign correct ESI priority and bed."
    difficulty: easy
    max_steps: 1
    passing_score: 0.70
    n_patients: 1
  task_medium:
    name: "ER Shift Management"
    description: "15-patient shift. Patients deteriorate if not triaged promptly."
    difficulty: medium
    max_steps: 30
    passing_score: 0.60
    n_patients: 15
  task_hard:
    name: "Mass Casualty Event"
    description: "40 patients, only 5 resus beds. Rationing required."
    difficulty: hard
    max_steps: 80
    passing_score: 0.50
    n_patients: 40

reward_range: [-1.0, 1.0]
reward_signals:
  priority_accuracy: {weight: 0.50, description: "ESI match: exact=0.50, off-by-1=0.25"}
  bed_assignment: {weight: 0.30, description: "Correct bed type per ESI level"}
  escalation_timing: {weight: 0.20, description: "Escalate for P1 and P2"}
  penalty: {description: "P1-as-P3: -0.30, P1-as-P4: -0.50, loop: -0.10"}

reproducible: true
default_seed: 42
grader_source: "AHRQ Emergency Severity Index Implementation Handbook Version 4 (Public Domain)"
