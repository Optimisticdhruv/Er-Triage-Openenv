version: '3.8'
services:
  er-triage-env:
    build: .
    image: er-triage-openenv:latest
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - PORT=7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
