name: Inference Script Validation

on:
  push:
    paths: ["inference.py", "app/**", ".env.example"]
  workflow_dispatch:

jobs:
  validate-inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify inference.py is in root
        run: |
          test -f inference.py && echo "PASS: inference.py in root"
      - name: Check inference.py structure
        run: |
          python -c "
          with open('inference.py') as f:
              src = f.read()
          checks = [('[START]', 'Missing [START] log'), ('[STEP]', 'Missing [STEP] log'),
                    ('[END]', 'Missing [END] log'), ('OpenAI', 'Missing OpenAI client'),
                    ('API_BASE_URL', 'Missing API_BASE_URL'), ('MODEL_NAME', 'Missing MODEL_NAME'),
                    ('HF_TOKEN', 'Missing HF_TOKEN')]
          for check, msg in checks:
              assert check in src, msg
          print('inference.py structure: PASS')
          "
      - name: Start server
        run: uvicorn app.main:app --port 7860 &
      - name: Wait for server
        run: sleep 5 && curl --retry 5 --retry-delay 2 -sf http://localhost:7860/health
      - name: Run inference dry-run test
        run: |
          python -c "
          import subprocess, sys, os
          # Test with mock environment (no real API calls)
          env = {**os.environ,
                 'OPENAI_API_KEY': 'test-key',
                 'API_BASE_URL': 'http://localhost:7860',
                 'MODEL_NAME': 'gpt-4o-mini',
                 'ENVIRONMENT_URL': 'http://localhost:7860'}
          try:
            proc = subprocess.run(['python', 'inference.py'],
                env=env, capture_output=True, text=True, timeout=10)
            # Check for OpenEnv format lines
            stdout = proc.stdout
            has_start = '[START]' in stdout
            has_step = '[STEP]' in stdout  
            has_end = '[END]' in stdout
            print(f'Format check - START: {has_start}, STEP: {has_step}, END: {has_end}')
            if has_start and has_step:
              print('inference.py format: PASS')
            else:
              print('inference.py format: FAIL - missing required format')
          except Exception as e:
            print(f'Dry run complete (expected without real API): {e}')
          "
